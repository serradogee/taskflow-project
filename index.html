<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOTEYOU</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <h1 onclick="showView('tasksView')">NOTEYOU</h1>
        <nav>
            <button onclick="showView('tasksView')">📝</button>
            <button onclick="showView('calendarView')">📅</button>
        </nav>
    </header>

    <main>

        <!-- ================= TAREAS ================= -->
        <section id="tasksView">

            <h2>Nueva Tarea</h2>

            <div class="card">
                <input type="text" id="taskTitle" placeholder="¿Qué tienes que hacer?">
                <input type="date" id="taskDate">

                <select id="taskCategory"></select>

                <select id="taskPriority">
                    <option value="Alta">Alta</option>
                    <option value="Media">Media</option>
                    <option value="Baja">Baja</option>
                </select>

                <button id="addBtn" onclick="addTask()">Añadir</button>
            </div>

            <h3>Filtros</h3>

            <div class="card">
                <input type="text" id="searchInput" placeholder="Buscar tarea...">

                <select id="filterPriority">
                    <option value="all">Todas prioridades</option>
                    <option value="Alta">Alta</option>
                    <option value="Media">Media</option>
                    <option value="Baja">Baja</option>
                </select>

                <select id="filterCategory">
                    <option value="all">Todas categorías</option>
                </select>

                <input type="date" id="filterDate">

                <button id="applyBtn" onclick="renderTasks()">Aplicar filtros</button>
            </div>

            <div id="taskList"></div>

        </section>

        <!-- ================= CALENDARIO ================= -->
        <section id="calendarView" style="display:none;">

            <h2>Calendario</h2>

            <div class="calendar-header">
                <button onclick="changeMonth(-1)">◀</button>
                <h3 id="monthYear"></h3>
                <button onclick="changeMonth(1)">▶</button>
            </div>

            <div id="calendar"></div>

            <h3 id="calendarTaskTitle" style="margin-top:20px;"></h3>
            <div id="calendarTaskList"></div>

        </section>

    </main>

    <script src="app.js"></script>
</body>
</html>
