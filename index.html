<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOTEYOU</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <h1 onclick="showView('tasksView')">NOTEYOU</h1>
        <nav>
            <button onclick="showView('tasksView')">📝</button>
            <button onclick="showView('calendarView')">📅</button>
        </nav>
    </header>

    <main>

        <!-- ================== NUEVA TAREA ================== -->
        <section id="tasksView">

            <h2>Nueva Tarea</h2>

            <div class="card form-card">
                <input type="text" id="taskTitle" placeholder="¿Qué tienes que hacer?">
                <input type="date" id="taskDate">
                <input type="time" id="taskTime" placeholder="Hora (opcional)">
                <input type="text" id="taskCategory" placeholder="Categoría (puedes escribir)">

                <select id="taskPriority">
                    <option value="Alta">Alta</option>
                    <option value="Media">Media</option>
                    <option value="Baja">Baja</option>
                </select>

                <button id="addBtn" onclick="addTask()">Añadir</button>
            </div>

            <h3>Filtros</h3>
            <div class="card filters">
                <input type="text" id="searchInput" placeholder="Buscar tarea...">
                <select id="filterPriority">
                    <option value="all">Todas prioridades</option>
                    <option value="Alta">Alta</option>
                    <option value="Media">Media</option>
                    <option value="Baja">Baja</option>
                </select>
                <input type="text" id="filterCategory" placeholder="Filtrar por categoría">
                <input type="date" id="filterDate">
                <button id="applyBtn" onclick="renderTasks()">Aplicar filtros</button>
            </div>

            <div id="taskList" class="task-grid"></div>

        </section>

        <!-- ================== CALENDARIO ================== -->
        <section id="calendarView" style="display:none;">
            <h2>Calendario</h2>

            <div class="calendar-header">
                <button onclick="changeMonth(-1)">◀</button>
                <h3 id="monthYear"></h3>
                <button onclick="changeMonth(1)">▶</button>
            </div>

            <div id="calendar"></div>

            <!-- MODAL ZOOM -->
            <div id="calendarDayDetail" class="calendar-zoom" style="display:none;">
                <div class="calendar-zoom-content">
                    <h3 id="calendarTaskTitle"></h3>
                    <div id="calendarTaskList" class="task-grid"></div>
                    <button onclick="closeCalendarZoom()">Cerrar</button>
                </div>
            </div>

        </section>

    </main>

    <script src="app.js"></script>
</body>
</html>
