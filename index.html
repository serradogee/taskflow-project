<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOTEYOU</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <h1 onclick="showView('homeView')">NOTEYOU</h1>
        <nav>
            
            <button onclick="showView('tasksView')">Tareas</button>
            <button onclick="showView('calendarView')">Calendario</button>
        </nav>
    </header>

    <main>

        <!-- ================== INICIO (CREAR TAREA) ================== -->
        <section id="homeView">

            <h2>Nueva Tarea</h2>

            <div class="card">
                <input type="text" id="taskTitle" placeholder="¿Qué tienes que hacer?">
                <input type="date" id="taskDate">
                <input type="time" id="taskTime">
                <input type="text" id="taskCategory" placeholder="Categoría libre">
                <select id="taskPriority">
                    <option value="Alta">Alta</option>
                    <option value="Media">Media</option>
                    <option value="Baja">Baja</option>
                </select>

                <button id="addBtn" onclick="addTask()">Crear Tarea</button>
            </div>

        </section>

        <!-- ================== TAREAS ================== -->
        <section id="tasksView" style="display:none;">

            <h2>Todas las Tareas</h2>

            <div class="filter-line">
                <input type="text" id="filterName" placeholder="Nombre">
                <input type="date" id="filterDay">
                <input type="text" id="filterCategory" placeholder="Categoría">
                <select id="filterPriority">
                    <option value="all">Dificultad</option>
                    <option value="Alta">Alta</option>
                    <option value="Media">Media</option>
                    <option value="Baja">Baja</option>
                </select>
                <button onclick="renderTasks()">Filtrar</button>
            </div>

            <div id="taskList" class="task-grid"></div>

        </section>

        <!-- ================== CALENDARIO ================== -->
        <section id="calendarView" style="display:none;">

            <h2>Calendario</h2>

            <div class="calendar-header">
                <button onclick="changeMonth(-1)">◀</button>
                <h3 id="monthYear"></h3>
                <button onclick="changeMonth(1)">▶</button>
            </div>

            <div id="calendar"></div>

            <div id="calendarModal" class="calendar-modal" style="display:none;">
                <div class="calendar-modal-content">
                    <h3 id="modalTitle"></h3>
                    <div id="modalTasks" class="task-grid"></div>
                    <button onclick="closeModal()">Cerrar</button>
                </div>
            </div>

        </section>

    </main>

    <script src="app.js"></script>
</body>
</html>
