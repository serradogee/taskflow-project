<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOTEYOU</title>
    <link rel="stylesheet" href="styles.css">
    
</head>
<body>
    <div class="container">
        <!-- Botón de menú en dispositivos pequeños -->
        <div class="menu-toggle" id="menuToggle">
            <span class="menu-icon">&#9776;</span>
        </div>

        <!-- Menú lateral -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>Menú</h2>
            </div>
            <ul class="sidebar-menu">
                <li><a href="#" id="taskMenu"><span>📝 Tareas</span></a></li>
                <li><a href="#" id="calendarMenu"><span>📅 Calendario</span></a></li>
                <li><a href="#" id="notesMenu"><span>🗒️ Notas</span></a></li>
                <li><a href="#" id="settingsMenu"><span>⚙️ Configuración</span></a></li>
            </ul>
        </nav>

        <!-- Área principal -->
        <div class="content">
            <header>
                <h1>Mis areas</h1>
            </header>

            <!-- Sección de tareas -->
            <section id="taskSection">
                <div class="add-task">
                    <input type="text" id="taskTitle" placeholder="Nueva tarea" required>
                    <select id="taskPriority">
                        <option value="Alta">Alta</option>
                        <option value="Media/Alta">Media/Alta</option>
                        <option value="Baja">Baja</option>
                    </select>
                    <button onclick="addTask()">Añadir Tarea</button>
                </div>

                <div class="task-list" id="taskList">
                    <!-- Tareas de ejemplo -->
                    <div class="task">
                        <h3>Entregar informe</h3>
                        <p class="task-category">Trabajo</p>
                        <span class="badge priority-high">Alta</span>
                    </div>
                    <div class="task">
                        <h3>Hacer la compra</h3>
                        <p class="task-category">Hogar</p>
                        <span class="badge priority-medium-high">Media/Alta</span>
                    </div>
                    <div class="task">
                        <h3>Leer un libro</h3>
                        <p class="task-category">Personales</p>
                        <span class="badge priority-low">Baja</span>
                    </div>
                </div>
            </section>

            <!-- Calendario -->
            <section id="calendarSection" style="display:none;">
                <h2>Calendario</h2>
                <div id="calendar"></div> <!-- Calendario aquí -->
            </section>

            <!-- Notas -->
            <section id="notesSection" style="display:none;">
                <h2>Mis Notas</h2>
                <textarea id="notes" placeholder="Escribe tus notas aquí..."></textarea>
            </section>
        </div>
    </div>

</body>
</html>
