<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="NOTEYOU - Organiza tus tareas y visualízalas en un calendario con un diseño claro y modo oscuro.">
    <title>NOTEYOU</title>

    <!-- Fuente principal -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CDN y configuración -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Habilitar modo oscuro por clase
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#e10600',
                        secondary: '#111'
                    }
                }
            }
        }
    </script>

    <!-- Estilos propios -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 font-sans">

    <header class="flex justify-between items-center p-4 bg-white dark:bg-gray-800 shadow-md">
        <h1 class="text-2xl font-bold cursor-pointer" onclick="showView('homeView')">NOTEYOU</h1>
        <nav class="flex gap-4" aria-label="Navegación principal">
            <button type="button" class="nav-btn" onclick="showView('homeView')">Inicio</button>
            <button type="button" class="nav-btn" onclick="showView('tasksView')">Tareas</button>
            <button type="button" class="nav-btn" onclick="showView('calendarView')">Calendario</button>
        </nav>
        <button id="darkToggle" type="button" class="px-3 py-1 border rounded hover:bg-gray-200 dark:hover:bg-gray-700"
            aria-pressed="false" aria-label="Cambiar modo de color">
            Modo Oscuro
        </button>
    </header>

    <main class="max-w-3xl mx-auto p-4">

        <!-- ================== INICIO (CREAR TAREA) ================== -->
        <section id="homeView" class="flex flex-col justify-center items-center min-h-[60vh]">
            <h2 class="text-xl font-semibold mb-4">Nueva Tarea</h2>

            <div class="card w-full max-w-md p-6 bg-white dark:bg-gray-800 rounded-xl shadow-lg flex flex-col gap-3">
                <label for="taskTitle" class="text-sm font-medium">Título de la tarea</label>
                <input type="text" id="taskTitle" name="taskTitle" placeholder="¿Qué tienes que hacer?"
                    class="p-2 rounded border border-gray-300 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary">

                <label for="taskDate" class="text-sm font-medium">Fecha</label>
                <input type="date" id="taskDate" name="taskDate"
                    class="p-2 rounded border border-gray-300 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary">

                <label for="taskTime" class="text-sm font-medium">Hora (opcional)</label>
                <input type="time" id="taskTime" name="taskTime"
                    class="p-2 rounded border border-gray-300 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary">

                <label for="taskCategory" class="text-sm font-medium">Categoría (opcional)</label>
                <input type="text" id="taskCategory" name="taskCategory" placeholder="Trabajo, estudios, personal..."
                    class="p-2 rounded border border-gray-300 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary">

                <label for="taskPriority" class="text-sm font-medium">Prioridad</label>
                <select id="taskPriority" name="taskPriority"
                    class="p-2 rounded border border-gray-300 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary">
                    <option value="Alta">Alta</option>
                    <option value="Media">Media</option>
                    <option value="Baja">Baja</option>
                </select>

                <button id="addBtn" type="button" onclick="addTask()"
                    class="bg-primary text-white py-2 rounded-lg hover:bg-red-700 transition-colors duration-300">
                    Crear Tarea
                </button>
            </div>

            <div id="taskSummaryCard"
                class="mt-8 w-full max-w-md bg-white dark:bg-gray-800 rounded-xl shadow-md p-4 flex flex-col gap-3">
                <h3 class="text-lg font-semibold">Resumen de tus tareas</h3>
                <div class="flex flex-col gap-1 text-sm">
                    <span>Total: <strong id="summaryTotal">0</strong></span>
                    <span>Completadas: <strong id="summaryCompleted">0</strong></span>
                    <span>Pendientes: <strong id="summaryPending">0</strong></span>
                    <span>Para hoy: <strong id="summaryToday">0</strong></span>
                </div>
                <div class="mt-2">
                    <p class="text-xs text-gray-600 dark:text-gray-300 mb-1">Progreso general</p>
                    <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2 overflow-hidden">
                        <div id="summaryProgressBar" class="bg-primary h-2 rounded-full" style="width: 0%;"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- ================== TAREAS ================== -->
        <section id="tasksView" class="hidden">
            <h2 class="text-xl font-semibold mb-2">Todas las Tareas</h2>
            <p id="taskCounter" class="text-sm text-gray-600 dark:text-gray-300 mb-4">0 tareas</p>

            <div class="filter-line flex flex-wrap gap-2 mb-4">
                <input type="text" id="filterName" placeholder="Nombre"
                    class="p-2 rounded border border-gray-300 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary">
                <input type="date" id="filterDay"
                    class="p-2 rounded border border-gray-300 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary">
                <input type="text" id="filterCategory" placeholder="Categoría"
                    class="p-2 rounded border border-gray-300 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary">
                <select id="filterPriority"
                    class="p-2 rounded border border-gray-300 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary">
                    <option value="all">Dificultad</option>
                    <option value="Alta">Alta</option>
                    <option value="Media">Media</option>
                    <option value="Baja">Baja</option>
                </select>
                <select id="sortOption"
                    class="p-2 rounded border border-gray-300 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary">
                    <option value="dateAsc">Fecha (más próximas primero)</option>
                    <option value="dateDesc">Fecha (más lejanas primero)</option>
                    <option value="titleAsc">Título (A-Z)</option>
                    <option value="priorityDesc">Prioridad (Alta → Baja)</option>
                </select>
                <button type="button" onclick="renderTasks()"
                    class="bg-primary text-white px-4 py-2 rounded-lg hover:bg-red-700 transition-colors duration-300">
                    Filtrar
                </button>
                <button type="button" onclick="resetTaskFilters()"
                    class="px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 text-sm hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors duration-300">
                    Limpiar filtros
                </button>
            </div>

            <div id="taskList" class="task-grid grid grid-cols-2 gap-4"></div>
        </section>

        <!-- ================== CALENDARIO ================== -->
        <section id="calendarView" class="hidden">
            <h2 class="text-xl font-semibold mb-4">Calendario</h2>

            <div class="calendar-header flex items-center justify-between mb-4">
                <button onclick="changeMonth(-1)" class="px-3 py-1 border rounded hover:bg-gray-200 dark:hover:bg-gray-700">◀</button>
                <h3 id="monthYear" class="text-lg font-semibold"></h3>
                <button onclick="changeMonth(1)" class="px-3 py-1 border rounded hover:bg-gray-200 dark:hover:bg-gray-700">▶</button>
            </div>

            <div id="calendar" class="grid grid-cols-7 gap-3"></div>

            <div id="calendarModal" class="calendar-modal hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
                <div class="calendar-modal-content bg-white dark:bg-gray-800 p-6 rounded-xl max-h-[80%] overflow-y-auto w-96">
                    <h3 id="modalTitle" class="text-lg font-semibold mb-4"></h3>
                    <div id="modalTasks" class="task-grid grid gap-3"></div>
                    <button onclick="closeModal()" class="mt-4 bg-primary text-white py-2 px-4 rounded-lg hover:bg-red-700 transition-colors duration-300">Cerrar</button>
                </div>
            </div>
        </section>

        <!-- ================== MODAL EDICIÓN TAREA ================== -->
        <div id="editTaskModal"
            class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
            <div class="bg-white dark:bg-gray-800 p-6 rounded-xl w-full max-w-md shadow-lg">
                <h3 class="text-lg font-semibold mb-4">Editar tarea</h3>

                <div class="flex flex-col gap-3">
                    <label for="editTaskTitle" class="text-sm font-medium">Título</label>
                    <input type="text" id="editTaskTitle"
                        class="p-2 rounded border border-gray-300 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary">

                    <label for="editTaskDate" class="text-sm font-medium">Fecha</label>
                    <input type="date" id="editTaskDate"
                        class="p-2 rounded border border-gray-300 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary">

                    <label for="editTaskTime" class="text-sm font-medium">Hora (opcional)</label>
                    <input type="time" id="editTaskTime"
                        class="p-2 rounded border border-gray-300 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary">

                    <label for="editTaskCategory" class="text-sm font-medium">Categoría (opcional)</label>
                    <input type="text" id="editTaskCategory"
                        class="p-2 rounded border border-gray-300 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary">

                    <label for="editTaskPriority" class="text-sm font-medium">Prioridad</label>
                    <select id="editTaskPriority"
                        class="p-2 rounded border border-gray-300 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary">
                        <option value="Alta">Alta</option>
                        <option value="Media">Media</option>
                        <option value="Baja">Baja</option>
                    </select>
                </div>

                <div class="flex justify-end gap-2 mt-6">
                    <button type="button" onclick="closeEditModal()"
                        class="px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 text-sm hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors duration-300">
                        Cancelar
                    </button>
                    <button type="button" onclick="saveTaskEdits()"
                        class="px-4 py-2 rounded-lg bg-primary text-white text-sm hover:bg-red-700 transition-colors duration-300">
                        Guardar cambios
                    </button>
                </div>
            </div>
        </div>

    </main>

    <script src="app.js"></script>
</body>
</html>
